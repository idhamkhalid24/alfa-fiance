<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Tracker - Minimalist Pro (IndexedDB)</title>
    <style>
        /* CSS INTERNAL UNTUK MODE OFFLINE */
        :root {
            --primary: #4f46e5;
            --primary-dark: #4338ca;
            --bg: #f1f5f9;
            --text-dark: #0f172a;
            --text-slate: #64748b;
            --white: #ffffff;
            --green: #16a34a;
            --red: #dc2626;
            --emerald: #059669;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text-dark);
            margin: 0;
            padding-bottom: 40px;
            line-height: 1.5;
        }

        .container {
            max-width: 448px;
            margin: 0 auto;
            padding: 16px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .logo {
            font-size: 20px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .logo span { color: var(--primary); }

        .badge {
            font-size: 10px;
            font-weight: bold;
            padding: 4px 12px;
            border-radius: 999px;
            border: 1px solid #e2e8f0;
        }

        /* Card Styles */
        .card {
            background: var(--white);
            border-radius: 16px;
            padding: 16px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            margin-bottom: 16px;
        }

        .limit-card {
            background: #0f172a;
            color: var(--white);
            padding: 16px;
            border-radius: 16px;
            margin-bottom: 16px;
            transition: background 0.5s ease;
        }

        .limit-card.danger { background: var(--red); }
        .limit-card.safe { background: var(--emerald); }

        .progress-container {
            width: 100%;
            background: rgba(255,255,255,0.1);
            height: 6px;
            border-radius: 3px;
            overflow: hidden;
            margin: 8px 0;
        }

        .progress-bar {
            height: 100%;
            background: var(--white);
            transition: width 0.7s ease;
        }

        /* Grid */
        .grid-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 16px;
        }

        .stat-item {
            background: var(--white);
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
        }

        .stat-label {
            font-size: 9px;
            font-weight: bold;
            color: var(--text-slate);
            text-transform: uppercase;
        }

        .stat-value {
            font-size: 14px;
            font-weight: bold;
            margin: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Form Elements */
        .input-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 12px;
        }

        input, select, textarea {
            width: 100%;
            padding: 10px 12px;
            border-radius: 8px;
            border: 1px solid #f1f5f9;
            background: #f8fafc;
            outline: none;
            font-size: 14px;
        }

        input:focus { border-color: var(--primary); }

        .amount-input {
            font-size: 20px;
            font-weight: 900;
            padding: 12px;
            border-width: 2px;
        }

        button {
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }

        .btn-primary {
            width: 100%;
            background: var(--primary);
            color: white;
            font-weight: bold;
            padding: 12px;
            border-radius: 12px;
            font-size: 16px;
        }

        .btn-primary:active { transform: scale(0.98); }

        /* Filter Tabs */
        .tabs {
            display: flex;
            gap: 4px;
            overflow-x: auto;
            padding-bottom: 8px;
            scrollbar-width: none;
            margin-bottom: 8px;
        }
        .tabs::-webkit-scrollbar { display: none; }

        .tab {
            white-space: nowrap;
            padding: 6px 16px;
            border-radius: 999px;
            font-size: 10px;
            font-weight: bold;
            background: var(--white);
            border: 1px solid #e2e8f0;
            color: var(--text-slate);
        }

        .tab.active {
            background: var(--primary);
            color: var(--white);
            border-color: var(--primary-dark);
        }

        /* Custom Range Selector */
        .range-selector {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 12px;
            background: var(--white);
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
        }

        .range-selector label {
            display: block;
            font-size: 8px;
            font-weight: bold;
            color: var(--text-slate);
            margin-bottom: 4px;
            text-transform: uppercase;
        }

        /* History List */
        .history-card {
            background: var(--white);
            border-radius: 16px;
            border: 1px solid #f1f5f9;
            overflow: hidden;
        }

        .history-header {
            padding: 12px 16px;
            background: #f8fafc;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #f1f5f9;
        }

        .history-list {
            max-height: 350px;
            overflow-y: auto;
        }

        .item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            border-bottom: 1px solid #f8fafc;
        }

        .item-info { display: flex; align-items: center; gap: 12px; }
        .icon-circle {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
        }

        /* Modals */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            z-index: 100;
        }

        .modal-content {
            background: var(--white);
            border-radius: 20px;
            padding: 24px;
            width: 100%;
            max-width: 360px;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
        }

        .hidden { display: none !important; }

        .text-green { color: var(--green); }
        .text-red { color: var(--red); }
        .text-primary { color: var(--primary); }

        /* Custom Scroll */
        .history-list::-webkit-scrollbar { width: 3px; }
        .history-list::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        /* Toast Notification */
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--text-dark);
            color: white;
            padding: 12px 24px;
            border-radius: 100px;
            font-size: 14px;
            font-weight: 500;
            z-index: 1000;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                transform: translate(-50%, 100%);
                opacity: 0;
            }
            to {
                transform: translate(-50%, 0);
                opacity: 1;
            }
        }
    </style>
</head>
<body>

    <!-- Modal Konfirmasi Sandi -->
    <div id="passwordModal" class="modal-overlay hidden">
        <div class="modal-content">
            <h3 style="text-align:center; margin-top:0;">Verifikasi Akses</h3>
            <input type="password" id="confirmPasswordInput" placeholder="Sandi: 170845" style="text-align:center; font-size:24px; letter-spacing:8px; margin-bottom:16px;">
            <div style="display:flex; gap:8px;">
                <button onclick="closePasswordModal()" style="flex:1; background:none; color:var(--text-slate); font-weight:bold;">Batal</button>
                <button id="btnConfirmAction" style="flex:1; background:var(--primary); color:white; padding:10px; border-radius:8px; font-weight:bold;">Lanjut</button>
            </div>
        </div>
    </div>

    <!-- Modal Pilihan Backup/Export -->
    <div id="backupOptionModal" class="modal-overlay hidden">
        <div class="modal-content">
            <h3 style="text-align:center; margin-top:0;">Menu Backup</h3>
            <div style="display:flex; flex-direction:column; gap:10px;">
                <button onclick="exportToFile()" style="padding:15px; border-radius:12px; background:#f8fafc; border:1px solid #e2e8f0; text-align:left;">
                    <strong style="display:block; font-size:14px;">Backup File (.json)</strong>
                    <span style="font-size:10px; color:var(--text-slate);">Simpan data ke perangkat</span>
                </button>
                <button onclick="copyToClipboard()" style="padding:15px; border-radius:12px; background:#f8fafc; border:1px solid #e2e8f0; text-align:left;">
                    <strong style="display:block; font-size:14px;">Salin ke Clipboard</strong>
                    <span style="font-size:10px; color:var(--text-slate);">Copy data untuk backup</span>
                </button>
                <button onclick="showImportModal()" style="padding:15px; border-radius:12px; background:#f8fafc; border:1px solid #e2e8f0; text-align:left;">
                    <strong style="display:block; font-size:14px;">Import dari Clipboard</strong>
                    <span style="font-size:10px; color:var(--text-slate);">Paste data yang sudah dicopy</span>
                </button>
                <button onclick="closeBackupModal()" style="color:var(--text-slate); font-size:12px; margin-top:10px; background:none;">Tutup</button>
            </div>
        </div>
    </div>

    <!-- Modal Import -->
    <div id="importModal" class="modal-overlay hidden">
        <div class="modal-content">
            <h3 style="text-align:center; margin-top:0;">Import Data</h3>
            <textarea id="importDataText" rows="5" placeholder="Tempel data JSON di sini..." style="width:100%; margin-bottom:16px; font-family:monospace; font-size:12px;"></textarea>
            <div style="display:flex; gap:8px;">
                <button onclick="closeImportModal()" style="flex:1; background:none; color:var(--text-slate); font-weight:bold;">Batal</button>
                <button onclick="importFromText()" style="flex:1; background:var(--primary); color:white; padding:10px; border-radius:8px; font-weight:bold;">Import</button>
            </div>
        </div>
    </div>

    <div class="container">
        <header>
            <div class="logo">Finance<span>Lite</span></div>
            <div id="statusBadge" class="badge">
                <span id="statusText">Status: Aman</span>
            </div>
        </header>

        <!-- Limit Card -->
        <section id="limitCard" class="limit-card">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <span style="font-size:10px; font-weight:bold; opacity:0.8; text-transform:uppercase;">Jatah Operasional (20%)</span>
                <span id="spendingLimit" style="font-size:14px; font-weight:bold;">Rp 0</span>
            </div>
            <div class="progress-container">
                <div id="limitBar" class="progress-bar" style="width: 0%"></div>
            </div>
            <p id="limitWarning" style="font-size:9px; margin:4px 0 0 0; font-weight:bold; font-style:italic; color:#fecaca;"></p>
        </section>

        <!-- Stats Grid -->
        <div class="grid-stats">
            <div class="stat-item">
                <p class="stat-label">Masuk</p>
                <p id="totalIncome" class="stat-value text-green">Rp 0</p>
            </div>
            <div class="stat-item">
                <p class="stat-label">Keluar</p>
                <p id="totalExpense" class="stat-value text-red">Rp 0</p>
            </div>
            <div class="stat-item">
                <p class="stat-label">Laba (20%)</p>
                <p id="autoProfit" class="stat-value text-primary">Rp 0</p>
            </div>
            <div class="stat-item">
                <p class="stat-label">Saldo</p>
                <p id="netBalance" class="stat-value">Rp 0</p>
            </div>
        </div>

        <!-- Form Input -->
        <section class="card">
            <div class="input-group">
                <input type="date" id="inputDate">
                <select id="type" onchange="updatePlaceholder()" style="color:var(--primary); font-weight:bold;">
                    <option value="income">Pemasukan (+)</option>
                    <option value="expense">Pengeluaran (-)</option>
                </select>
            </div>
            <input type="text" id="description" placeholder="Deskripsi..." style="margin-bottom:12px;">
            
            <div style="position:relative; margin-bottom:16px;">
                <input type="number" id="amount" placeholder="Nominal (e.g: 1200)" oninput="handleSmartAmount(this)" class="amount-input">
                <p id="liveAmountPreview" style="position:absolute; right:12px; top:50%; transform:translateY(-50%); margin:0; font-size:10px; font-weight:bold; color:var(--primary); font-style:italic;"></p>
            </div>

            <button onclick="addTransaction()" class="btn-primary">Simpan</button>
        </section>

        <!-- Filter & List -->
        <section>
            <div class="tabs">
                <button onclick="changeFilter('today')" id="filter-today" class="tab active">Hari Ini</button>
                <button onclick="changeFilter('month')" id="filter-month" class="tab">Bulan Ini</button>
                <button onclick="changeFilter('range')" id="filter-range" class="tab">Kustom</button>
                <button onclick="changeFilter('all')" id="filter-all" class="tab">Semua</button>
                <button onclick="openBackupModal()" style="margin-left:auto; background:var(--primary); color:white; border:none;" class="tab">Backup</button>
            </div>

            <!-- Custom Selector (Hidden by default) -->
            <div id="rangeSelector" class="range-selector hidden">
                <div>
                    <label>Mulai</label>
                    <input type="date" id="filterStartDate" onchange="render()">
                </div>
                <div>
                    <label>Selesai</label>
                    <input type="date" id="filterEndDate" onchange="render()">
                </div>
            </div>

            <div class="history-card">
                <div class="history-header">
                    <h2 id="currentPeriodLabel" style="font-size:10px; font-weight:900; text-transform:uppercase; color:var(--text-slate); letter-spacing:1px; margin:0;">Riwayat</h2>
                    <button onclick="requestClearAll()" style="font-size:9px; font-weight:bold; color:var(--red); background:none; text-transform:uppercase;">Reset</button>
                </div>
                <div id="transactionList" class="history-list"></div>
            </div>
        </section>
    </div>

    <script>
        const DB_NAME = 'FinanceTrackerDB';
        const DB_VERSION = 1;
        const STORE_NAME = 'transactions';
        const APP_PASSWORD = '170845';
        
        let db;
        let transactions = [];
        let currentFilter = 'today';
        let pendingAction = null;

        // Toast notification
        function showToast(message, duration = 3000) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.remove();
            }, duration);
        }

        // Inisialisasi IndexedDB
        function initDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, DB_VERSION);
                
                request.onerror = () => reject(request.error);
                request.onsuccess = () => {
                    db = request.result;
                    resolve(db);
                };
                
                request.onupgradeneeded = (event) => {
                    const db = event.target.result;
                    if (!db.objectStoreNames.contains(STORE_NAME)) {
                        const store = db.createObjectStore(STORE_NAME, { keyPath: 'id' });
                        store.createIndex('date', 'date', { unique: false });
                        store.createIndex('type', 'type', { unique: false });
                    }
                };
            });
        }

        // Load semua transaksi dari IndexedDB
        async function loadTransactions() {
            return new Promise((resolve, reject) => {
                const transaction = db.transaction([STORE_NAME], 'readonly');
                const store = transaction.objectStore(STORE_NAME);
                const request = store.getAll();
                
                request.onsuccess = () => {
                    transactions = request.result || [];
                    transactions.sort((a, b) => new Date(b.date) - new Date(a.date));
                    resolve(transactions);
                };
                
                request.onerror = () => reject(request.error);
            });
        }

        // Simpan transaksi ke IndexedDB
        async function saveTransaction(transactionData) {
            return new Promise((resolve, reject) => {
                const tx = db.transaction([STORE_NAME], 'readwrite');
                const store = tx.objectStore(STORE_NAME);
                const request = store.add(transactionData);
                
                request.onsuccess = () => resolve();
                request.onerror = () => reject(request.error);
            });
        }

        // Hapus transaksi dari IndexedDB
        async function deleteTransactionFromDB(id) {
            return new Promise((resolve, reject) => {
                const tx = db.transaction([STORE_NAME], 'readwrite');
                const store = tx.objectStore(STORE_NAME);
                const request = store.delete(id);
                
                request.onsuccess = () => resolve();
                request.onerror = () => reject(request.error);
            });
        }

        // Hapus semua transaksi
        async function clearAllTransactions() {
            return new Promise((resolve, reject) => {
                const tx = db.transaction([STORE_NAME], 'readwrite');
                const store = tx.objectStore(STORE_NAME);
                const request = store.clear();
                
                request.onsuccess = () => resolve();
                request.onerror = () => reject(request.error);
            });
        }

        // Import banyak transaksi
        async function importTransactions(newTransactions) {
            return new Promise((resolve, reject) => {
                const tx = db.transaction([STORE_NAME], 'readwrite');
                const store = tx.objectStore(STORE_NAME);
                
                // Clear existing data
                store.clear().onsuccess = () => {
                    // Add all new transactions
                    newTransactions.forEach(t => {
                        store.add(t);
                    });
                };
                
                tx.oncomplete = () => resolve();
                tx.onerror = () => reject(tx.error);
            });
        }

        function getLocalDateString() {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        // Init default dates
        document.getElementById('inputDate').value = getLocalDateString();
        document.getElementById('filterStartDate').value = getLocalDateString();
        document.getElementById('filterEndDate').value = getLocalDateString();

        function openPasswordModal(actionCallback) {
            pendingAction = actionCallback;
            document.getElementById('passwordModal').classList.remove('hidden');
            document.getElementById('confirmPasswordInput').value = '';
            document.getElementById('confirmPasswordInput').focus();
        }

        function closePasswordModal() {
            document.getElementById('passwordModal').classList.add('hidden');
            pendingAction = null;
        }

        document.getElementById('btnConfirmAction').addEventListener('click', () => {
            if (document.getElementById('confirmPasswordInput').value === APP_PASSWORD) {
                const action = pendingAction;
                closePasswordModal(); 
                if (action) action();
            } else {
                showToast("Sandi Salah!");
                document.getElementById('confirmPasswordInput').value = '';
            }
        });

        async function addTransaction() {
            const dateVal = document.getElementById('inputDate').value;
            const type = document.getElementById('type').value;
            let desc = document.getElementById('description').value.trim();
            const amount = getActualAmount(document.getElementById('amount').value);

            if (type === 'income' && !desc) desc = "Omset";
            if (type === 'expense' && !desc) { showToast("Deskripsi wajib diisi untuk Pengeluaran"); return; }
            if (!dateVal || amount <= 0) { showToast("Nominal tidak valid"); return; }

            const newEntry = { 
                id: Date.now(), 
                date: dateVal, 
                description: desc, 
                amount: amount, 
                type: type 
            };
            
            await saveTransaction(newEntry);
            await loadTransactions();
            
            render();
            
            document.getElementById('description').value = '';
            document.getElementById('amount').value = '';
            document.getElementById('liveAmountPreview').innerText = '';
            document.getElementById('inputDate').value = getLocalDateString();
            
            showToast("Transaksi berhasil disimpan");
        }

        function changeFilter(filter) {
            currentFilter = filter;
            
            // Show/Hide Custom Selector
            const rangeSelector = document.getElementById('rangeSelector');
            if (filter === 'range') {
                rangeSelector.classList.remove('hidden');
            } else {
                rangeSelector.classList.add('hidden');
            }

            updateFilterUI();
            render();
        }

        function updateFilterUI() {
            ['today', 'month', 'range', 'all'].forEach(f => {
                const el = document.getElementById(`filter-${f}`);
                if (el) el.classList.remove('active');
            });
            const activeEl = document.getElementById(`filter-${currentFilter}`);
            if (activeEl) activeEl.classList.add('active');
        }

        async function deleteTransaction(id) {
            openPasswordModal(async () => {
                await deleteTransactionFromDB(id);
                await loadTransactions();
                render();
                showToast("Transaksi dihapus");
            });
        }

        async function requestClearAll() {
            openPasswordModal(async () => {
                if(confirm("Hapus semua data?")) {
                    await clearAllTransactions();
                    await loadTransactions();
                    render();
                    showToast("Semua data dihapus");
                }
            });
        }

        function formatRupiah(num) {
            return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(num);
        }

        function getActualAmount(rawValue) {
            if (!rawValue || isNaN(rawValue)) return 0;
            return parseFloat(rawValue) * 1000;
        }

        function handleSmartAmount(input) {
            const preview = document.getElementById('liveAmountPreview');
            if (!input.value) { preview.innerText = ""; return; }
            preview.innerText = formatRupiah(getActualAmount(input.value));
        }

        function updatePlaceholder() {
            const type = document.getElementById('type').value;
            document.getElementById('description').placeholder = type === 'expense' ? "Makan, Listrik, dll" : "Omset (jika kosong)";
        }

        function render() {
            const list = document.getElementById('transactionList');
            const label = document.getElementById('currentPeriodLabel');
            list.innerHTML = '';
            
            const nowStr = getLocalDateString();
            const startRange = document.getElementById('filterStartDate').value;
            const endRange = document.getElementById('filterEndDate').value;

            const filtered = transactions.filter(t => {
                if (currentFilter === 'today') return t.date === nowStr;
                if (currentFilter === 'month') return t.date.startsWith(nowStr.substring(0, 7));
                if (currentFilter === 'range') {
                    return t.date >= startRange && t.date <= endRange;
                }
                return true;
            });

            if (currentFilter === 'today') label.innerText = "Hari Ini";
            else if (currentFilter === 'month') label.innerText = "Bulan Ini";
            else if (currentFilter === 'range') label.innerText = "Periode Kustom";
            else label.innerText = "Semua Riwayat";

            let ti = 0, te = 0;
            filtered.forEach(t => {
                if (t.type === 'income') ti += t.amount; else te += t.amount;
                const div = document.createElement('div');
                div.className = "item";
                div.innerHTML = `
                    <div class="item-info">
                        <div class="icon-circle" style="background:${t.type === 'income' ? '#f0fdf4' : '#fef2f2'}; color:${t.type === 'income' ? '#16a34a' : '#dc2626'}">
                            ${t.type === 'income' ? '↑' : '↓'}
                        </div>
                        <div>
                            <p style="font-size:11px; font-weight:bold; margin:0; color:#334155;">${t.description}</p>
                            <p style="font-size:8px; color:var(--text-slate); margin:0;">${t.date}</p>
                        </div>
                    </div>
                    <div style="display:flex; align-items:center; gap:12px;">
                        <p style="font-size:11px; font-weight:900; margin:0; color:${t.type === 'income' ? '#16a34a' : '#dc2626'}">
                            ${t.type === 'income' ? '+' : '-'}${formatRupiah(t.amount).replace('Rp', '')}
                        </p>
                        <button onclick="deleteTransaction(${t.id})" style="color:#e2e8f0; font-size:16px; background:none;">×</button>
                    </div>
                `;
                list.appendChild(div);
            });

            const profit = ti * 0.2;
            const net = ti - te;
            const remaining = profit - te;
            const usage = profit > 0 ? (te / profit) * 100 : 0;

            document.getElementById('totalIncome').innerText = formatRupiah(ti);
            document.getElementById('totalExpense').innerText = formatRupiah(te);
            document.getElementById('autoProfit').innerText = formatRupiah(profit);
            document.getElementById('netBalance').innerText = formatRupiah(net);
            document.getElementById('spendingLimit').innerText = formatRupiah(remaining);
            document.getElementById('limitBar').style.width = `${Math.min(usage, 100)}%`;

            const card = document.getElementById('limitCard');
            const warn = document.getElementById('limitWarning');
            const badge = document.getElementById('statusBadge');

            if (te > profit && profit > 0) {
                card.className = "limit-card danger";
                warn.innerText = "OVER BUDGET! ( > 20% )";
                badge.style.background = "#fef2f2";
                badge.style.borderColor = "#fecaca";
                badge.style.color = "#dc2626";
                document.getElementById('statusText').innerText = "Status: Bahaya";
            } else {
                card.className = ti > 0 ? "limit-card safe" : "limit-card";
                warn.innerText = "";
                badge.style.background = "#f0fdf4";
                badge.style.borderColor = "#bbf7d0";
                badge.style.color = "#16a34a";
                document.getElementById('statusText').innerText = "Status: Aman";
            }
        }

        // Backup & Restore
        function openBackupModal() {
            if (transactions.length === 0) {
                showToast("Data masih kosong.");
                return;
            }
            document.getElementById('backupOptionModal').classList.remove('hidden');
        }

        function closeBackupModal() {
            document.getElementById('backupOptionModal').classList.add('hidden');
        }

        function showImportModal() {
            closeBackupModal();
            document.getElementById('importModal').classList.remove('hidden');
        }

        function closeImportModal() {
            document.getElementById('importModal').classList.add('hidden');
            document.getElementById('importDataText').value = '';
        }

        function exportToFile() {
            const dataStr = JSON.stringify(transactions, null, 2);
            const blob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `finance_backup_${getLocalDateString()}.json`;
            a.click();
            URL.revokeObjectURL(url);
            closeBackupModal();
            showToast("File backup tersimpan");
        }

        function copyToClipboard() {
            const dataStr = JSON.stringify(transactions);
            navigator.clipboard.writeText(dataStr).then(() => {
                showToast("Data berhasil disalin ke clipboard!");
                closeBackupModal();
            }).catch(() => {
                // Fallback untuk browser lama
                const dummy = document.createElement("textarea");
                document.body.appendChild(dummy);
                dummy.value = dataStr;
                dummy.select();
                document.execCommand("copy");
                document.body.removeChild(dummy);
                showToast("Data berhasil disalin ke clipboard!");
                closeBackupModal();
            });
        }

        async function importFromText() {
            const raw = document.getElementById('importDataText').value.trim();
            if (!raw) {
                showToast("Data tidak boleh kosong");
                return;
            }
            
            try {
                const imported = JSON.parse(raw);
                if (!Array.isArray(imported)) {
                    showToast("Format data tidak valid");
                    return;
                }
                
                // Validasi struktur data
                const isValid = imported.every(item => 
                    item.id && 
                    item.date && 
                    item.description && 
                    typeof item.amount === 'number' && 
                    (item.type === 'income' || item.type === 'expense')
                );
                
                if (!isValid) {
                    showToast("Struktur data tidak valid");
                    return;
                }
                
                await importTransactions(imported);
                await loadTransactions();
                render();
                closeImportModal();
                showToast(`Berhasil import ${imported.length} transaksi`);
            } catch (e) {
                showToast("Format JSON salah");
            }
        }

        // Initialize aplikasi
        async function initApp() {
            try {
                await initDB();
                await loadTransactions();
                render();
                showToast("Aplikasi siap digunakan");
            } catch (error) {
                console.error('Failed to initialize:', error);
                showToast("Gagal menginisialisasi database");
            }
        }

        // Start the app
        initApp();
    </script>
</body>
</html>
